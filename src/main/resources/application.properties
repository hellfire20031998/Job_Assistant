spring.application.name=JobAssistant

# Never enable in production — avoids leaking exception messages to API clients.
app.api.expose-internal-error-details=false

# Google OAuth2 (set real values via env or this file; placeholders allow the app to start locally)
spring.security.oauth2.client.registration.google.provider=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:change-me-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:change-me-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Same-origin redirect after Google callback (SPA or web app URL)
app.auth.oauth2.login-success-redirect=http://localhost:5173/
app.auth.oauth2.login-failure-redirect=http://localhost:5173/login?error=oauth
app.auth.oauth2.logout-success-redirect=http://localhost:5173/

# Browser clients that send cookies (JWT cookie) with API calls — list your front-end origins
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# JWT (HS256). Override secret in production (min 32 UTF-8 bytes).
app.jwt.secret=${JWT_SECRET:dev-only-change-me-min-32-chars-long-secret!!}
app.jwt.expiration-ms=3600000
app.jwt.cookie-name=accessToken
app.jwt.cookie-secure=false
app.jwt.cookie-same-site=Lax
app.jwt.append-token-to-redirect=false

spring.data.mongodb.auto-index-creation=true
