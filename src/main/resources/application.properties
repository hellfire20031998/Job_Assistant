spring.application.name=JobAssistant

# Never enable in production — avoids leaking exception messages to API clients.
app.api.expose-internal-error-details=false

# Google OAuth2 — set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET via environment (e.g. server.env + IDE env file).
# Do not commit real client IDs or secrets in this file.
spring.security.oauth2.client.registration.google.provider=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Next.js client (JobAssistant/client) — adjust host/port if you use another dev server
app.auth.oauth2.login-success-redirect=http://localhost:3000/auth/callback
app.auth.oauth2.login-failure-redirect=http://localhost:3000/auth/error
app.auth.oauth2.logout-success-redirect=http://localhost:3000/

# Browser clients that send cookies (JWT cookie) with API calls
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# JWT (HS256). Override secret in production (min 32 UTF-8 bytes).
app.jwt.secret=${JWT_SECRET:dev-only-change-me-min-32-chars-long-secret!!}
app.jwt.expiration-ms=3600000
app.jwt.cookie-name=accessToken
app.jwt.cookie-secure=false
app.jwt.cookie-same-site=Lax
# true: adds access_token to OAuth success URL so Next.js can use Bearer when the JWT cookie is not sent cross-port
app.jwt.append-token-to-redirect=true

# MongoDB — must use spring.data.mongodb.uri (not spring.mongodb.uri).
# Set MONGODB_URI for Atlas; if unset, defaults to local below.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/jobassistant}
spring.data.mongodb.database=${MONGO_DATABASE:jobassistant}


spring.data.mongodb.auto-index-creation=true
