# Set GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, JWT_SECRET (>=32 UTF-8 bytes), app.jwt.cookie-secure=true,
# app.cors.allowed-origins, app.auth.oauth2.* redirects, spring.data.mongodb.uri via env / secrets.
